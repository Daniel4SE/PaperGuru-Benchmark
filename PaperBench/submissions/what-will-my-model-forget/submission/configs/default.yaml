# =====================================================================
# Hyperparameters for "What Will My Model Forget?" (Jin & Ren, ICML 2024)
# Source: paper §4.1 (Hyperparameters) and the addendum.
# =====================================================================

# ---- Base PTLMs (§4.1) -----------------------------------------------
base_lm:
  bart0:
    name: yuchenlin/BART0
    type: bart
    n_params: 400M
  flan_t5_large:
    name: google/flan-t5-large
    type: t5
    n_params: 780M
  flan_t5_3b:
    name: google/flan-t5-xl # 3B
    type: t5
    n_params: 3B

# default model used for smoke / single-GPU runs
default_lm: flan_t5_large

# ---- Refinement (§4.1 Hyperparameters) -------------------------------
refinement:
  k_steps_full_or_lora: 30
  k_steps_head_only: 100

  # learning rates for SINGLE-error refinement
  lr_single:
    bart0: 1.0e-5
    flan_t5: 1.0e-4
    head_bart0: 1.0e-3
    head_flan_t5: 1.0e-4

  # learning rates for SEQUENTIAL refinement (smaller per §4.1)
  lr_sequential:
    bart0: 1.0e-6
    flan_t5: 1.0e-5

  optimizer: adamw
  weight_decay: 0.0
  grad_clip: 1.0
  fp16: true # canonical for ICML 2024 spotlight setups

# ---- LoRA (per addendum) --------------------------------------------
lora:
  r: 16
  alpha: 32
  dropout: 0.1
  bias: none
  target_modules: [q, v] # query & value of self-attention
  task_type: SEQ_2_SEQ_LM

# ---- Replay (§4.2) ---------------------------------------------------
replay:
  bart0_large:
    batch_size: 8
    every_n_steps: 10
  flan_t5_large:
    batch_size: 8
    every_n_steps: 10
  flan_t5_3b:
    batch_size: 4
    every_n_steps: 5
  # KD distillation against the base LM f_0 (Buzzega et al. 2020a, DER)
  use_distillation: true
  kd_temperature: 1.0
  kd_alpha: 0.5

# ---- Forecasting models ---------------------------------------------
forecasting:
  # encoder used for h(x, y) in §3.2 / §3.3
  encoder:
    name: google/flan-t5-base # small encoder for the forecaster itself
    hidden_dim: 768
    proj_dim: 256 # low-d projection used in §3.2 / §3.3
    max_input_len: 512
    max_output_len: 64

  threshold:
    # γ tuned to maximize F1 on D_R^Train (Eqn. 1, §3.1)
    gamma_search_min: 1
    gamma_search_max: 200

  logit_based:
    margin: 1.0 # Eqn. 3 margin
    top_k_logits: 100 # cache top-100 logits per output token
    lr: 1.0e-4
    epochs: 5
    batch_size: 32

  representation_based:
    use_frequency_prior: true # §3.3 frequency prior bias b_j
    lr: 1.0e-4
    epochs: 5
    batch_size: 64

# ---- Data (§4.1, addendum) ------------------------------------------
data:
  # D_PT: 36 P3 training tasks, 100 examples per task, balanced
  d_pt:
    p3_tasks_n: 36
    examples_per_task: 100

  # D_R splits
  d_r_train_frac: 0.60 # 60/40 split per addendum
  d_r_test_frac: 0.40

  # MMLU validation split (per addendum; original release)
  mmlu:
    split: validation
    url: https://people.eecs.berkeley.edu/~hendrycks/data.tar

  # ID / OOD task splits for Table 2 (full FT setup, per addendum)
  ood_split:
    id_tasks: [super_glue-cb, super_glue-rte, anli, super_glue-wic]
    ood_tasks:
      [
        super_glue-wsc.fixed,
        winogrande-winogrande_xl,
        super_glue-copa,
        hellaswag,
      ]

# ---- Eval ------------------------------------------------------------
eval:
  metric_for_d_r: squad_em # SQuAD 2.0 EM scorer (per addendum)
  report:
    - f1
    - precision
    - recall
    - edit_success_rate
    - em_drop_ratio

# ---- Output ----------------------------------------------------------
output:
  metrics_path: /output/metrics.json
  log_dir: /output/logs
  cache_dir: ./.cache
