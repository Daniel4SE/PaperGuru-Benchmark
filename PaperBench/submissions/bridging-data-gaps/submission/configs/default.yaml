# =====================================================================
# DPMs-ANT default configuration
# Source: "Bridging Data Gaps in Diffusion Models with Adversarial
#          Noise-Based Transfer Learning" (Wang et al., ICML 2024)
# Hyperparameters drawn from paper §5.2 + addendum.md
# =====================================================================

# ---------------------------------------------------------------------
# Backbone diffusion model: 'ddpm' or 'ldm'
# Paper §5.2: "We evaluate our method not only on the DDPM framework
# but also in LDM."
# ---------------------------------------------------------------------
framework: ddpm # {ddpm, ldm}

# Image size: DDPM operates at 256, LDM operates in 64-channel latent
image_size: 256
image_channels: 3

# ---------------------------------------------------------------------
# Diffusion schedule (DDPM, Ho et al. 2020)
# ---------------------------------------------------------------------
diffusion:
  num_timesteps: 1000
  beta_schedule: linear # {linear, cosine}
  beta_start: 0.0001
  beta_end: 0.02
  parameterization: eps # predict epsilon (Ho et al. 2020)

# ---------------------------------------------------------------------
# U-Net backbone (paper uses Dhariwal & Nichol 2021 ADM at 256x256
# for DDPM, and Rombach et al. 2022 LDM autoencoder for LDM).
# ---------------------------------------------------------------------
unet:
  in_channels: 3
  out_channels: 3
  base_channels: 128
  channel_mult: [1, 1, 2, 2, 4, 4]
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.0
  num_heads: 4

# ---------------------------------------------------------------------
# Adaptor module ψ  (paper §4.3 + addendum)
# ψ^l(x) = f(x · W_down) · W_up,  bottleneck ∈ R^{w/c × h/c × d}
# c = 4, d = 8 for DDPM; c = 2, d = 8 for LDM.
# Addendum: down-pool → norm + 3x3 conv → 4-head attention → MLP →
#           up-sample(x4) → norm → 3x3 conv.
# ---------------------------------------------------------------------
adaptor:
  c: 4 # spatial down-projection factor (DDPM)
  d: 8 # bottleneck channel dim
  attention_heads: 4
  zero_init: true # paper §5.2: "set all the extra layer parameters to zero"

# ---------------------------------------------------------------------
# Similarity-guided training  (paper §4.1, Eq. 5)
# γ controls the strength of the classifier guidance term
# σ̂_t = (1 - ᾱ_{t-1}) · sqrt(α_t / (1 - ᾱ_t))
# ---------------------------------------------------------------------
similarity:
  gamma: 5.0 # paper §5.2: "we set γ = 5"
  classifier_ckpt: null # path to fine-tuned binary classifier

classifier:
  # Pre-trained ADM classifier (addendum):
  #   DDPM 256x256 -> https://openaipublic.blob.core.windows.net/diffusion/jul-2021/256x256_classifier.pt
  #   LDM   64x64  -> https://openaipublic.blob.core.windows.net/diffusion/jul-2021/64x64_classifier.pt
  pretrained_url: "https://openaipublic.blob.core.windows.net/diffusion/jul-2021/256x256_classifier.pt"
  num_classes: 2 # binary: source vs target
  optimizer: adam # addendum
  lr: 1.0e-4
  batch_size: 64
  iterations: 300

# ---------------------------------------------------------------------
# Adversarial Noise selection  (paper §4.2, Eq. 7)
# ε^{j+1} = Norm( ε^j + ω · ∇_ε ||ε^j - ε_θ(√ᾱ_t x_0 + √(1-ᾱ_t) ε^j, t)||² )
# ---------------------------------------------------------------------
adversarial:
  J: 10 # paper §5.2: "we set J = 10"
  omega: 0.02 # paper §5.2: "ω = 0.02"
  enabled: true # ablation: set false for "DPMs-ANT w/o AN"

# ---------------------------------------------------------------------
# Training (paper §5.2)
# DDPM lr: 5e-5,   LDM lr: 1e-5,   batch=40,   ~300 iters
# ---------------------------------------------------------------------
train:
  iterations: 300
  batch_size: 40
  lr: 5.0e-5 # DDPM
  optimizer: adamw
  weight_decay: 0.0
  ema_decay: 0.9999 # following Ho et al. 2020
  grad_clip: 1.0
  mixed_precision: false
  log_every: 10
  ckpt_every: 100
  freeze_backbone: true # only adaptor ψ is updated

# ---------------------------------------------------------------------
# Data
# Source datasets : FFHQ, LSUN-Church
# Target datasets : 10-shot Babies / Sunglasses / Raphael / Sketches /
#                   Modigliani / Haunted Houses / Landscape drawings
# ---------------------------------------------------------------------
data:
  source: ffhq # {ffhq, lsun_church}
  target:
    sunglasses # {babies, sunglasses, raphael, sketches,
    #  modigliani, haunted_houses, landscape}
  source_root: ./datasets/ffhq
  target_root: ./datasets/10shot_sunglasses
  num_target_images: 10
  num_workers: 2
  augment: true # horizontal flip only (no AdaAug; we are DPM)

# ---------------------------------------------------------------------
# Sampling / Evaluation
# ---------------------------------------------------------------------
sample:
  num_samples: 1000 # for Intra-LPIPS (paper §5.2)
  ddim_steps: 50
  eta: 0.0
  guidance_scale: 1.0

eval:
  intra_lpips: true # paper §5.2 main metric for diversity
  fid:
    true # paper §5.2: "FID evaluations using larger
    #              target datasets"
  fid_real_root: ./datasets/full_target

seed: 42
device: cuda
output_dir: ./outputs
