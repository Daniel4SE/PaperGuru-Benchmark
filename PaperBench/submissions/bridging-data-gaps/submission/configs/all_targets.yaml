# =====================================================================
# All target-specific hyperparameters from addendum.md (Table 3 settings)
# Each entry overrides default.yaml for that source -> target pair.
# =====================================================================

ddpm_ffhq_babies:
  framework: ddpm
  data: { source: ffhq, target: babies }
  train: { lr: 5.0e-6, iterations: 160 }
  adaptor: { c: 8, d: 8 }
  similarity: { gamma: 3.0 }
  adversarial: { J: 10, omega: 0.02 }

ddpm_ffhq_sunglasses:
  framework: ddpm
  data: { source: ffhq, target: sunglasses }
  train: { lr: 5.0e-5, iterations: 200 }
