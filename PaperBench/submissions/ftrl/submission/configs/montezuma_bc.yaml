# Fine-tuning + BC on Montezuma's Revenge.
# §4: BC mitigates state coverage gap.
env: montezuma
algo: ppo_rnd
total_steps: 50_000_000
retention: behavioral_cloning
bc_loss_coef: 1.0
bc_dataset: montezuma_500_trajectories # Addendum: 500 trajectories starting at Room 7
bc_buffer_size: 100000
load_pretrained: true
pretrained_room: 7
max_step_per_episode: 4500
ext_coef: 2.0
int_coef: 1.0
learning_rate: 1.0e-4
num_env: 128
num_step: 128
gamma: 0.999
int_gamma: 0.99
lam: 0.95
state_stack_size: 4
preproc_h: 84
preproc_w: 84
use_gae: true
clip_grad_norm: 0.5
entropy: 0.001
epoch: 4
mini_batch: 4
ppo_eps: 0.1
sticky_action: true
action_prob: 0.25
update_proportion: 0.25
life_done: false
obs_norm_step: 50
