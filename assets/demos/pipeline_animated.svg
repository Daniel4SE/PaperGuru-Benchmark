<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="-apple-system, Inter, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fafafa"/>
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0a0a0b" flood-opacity="0.10"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0a0a0b"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Title bar -->
  <text x="600" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#6b6b72" letter-spacing="3">
    PAPERGURU · CCM PIPELINE
  </text>

  <!-- ========== STAGE 1: SEARCH ========== -->
  <g transform="translate(60, 110)">
    <rect width="220" height="170" rx="14" fill="#dbeafe" filter="url(#card-shadow)"/>
    <text x="110" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb" letter-spacing="2">01 · SEARCH</text>
    <!-- icon: stack of papers with magnifier -->
    <g transform="translate(80, 50)">
      <rect x="0" y="10" width="50" height="62" rx="3" fill="#fff" stroke="#2563eb" stroke-width="1.5" opacity="0.7"/>
      <rect x="6" y="4" width="50" height="62" rx="3" fill="#fff" stroke="#2563eb" stroke-width="1.5" opacity="0.85"/>
      <rect x="12" y="0" width="50" height="62" rx="3" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
      <line x1="20" y1="14" x2="56" y2="14" stroke="#2563eb" stroke-width="1.2"/>
      <line x1="20" y1="22" x2="50" y2="22" stroke="#2563eb" stroke-width="1.2"/>
      <line x1="20" y1="30" x2="56" y2="30" stroke="#2563eb" stroke-width="1.2"/>
      <line x1="20" y1="38" x2="46" y2="38" stroke="#2563eb" stroke-width="1.2"/>
      <circle cx="55" cy="55" r="10" fill="none" stroke="#2563eb" stroke-width="2.5"/>
      <line x1="63" y1="63" x2="72" y2="72" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <text x="110" y="148" text-anchor="middle" font-size="10" fill="#1a1a1d" font-weight="500">retrieving 1,247 papers...</text>
    <!-- pulsing dot -->
    <circle cx="195" cy="22" r="4" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- arrow 1 -->
  <line x1="290" y1="195" x2="318" y2="195" stroke="#0a0a0b" stroke-width="1.5" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray" values="2,2" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <text x="304" y="184" text-anchor="middle" font-size="8" fill="#6b6b72" font-weight="500" letter-spacing="0.5">EVIDENCE</text>

  <!-- ========== STAGE 2: EXTRACT (Evidence Cards) ========== -->
  <g transform="translate(330, 110)">
    <rect width="220" height="170" rx="14" fill="#d1fae5" filter="url(#card-shadow)"/>
    <text x="110" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#0d9488" letter-spacing="2">02 · EXTRACT</text>
    <!-- 4 mini cards stacking up -->
    <g transform="translate(40, 50)">
      <g>
        <rect x="0" y="0" width="140" height="22" rx="3" fill="#fff" stroke="#0d9488" stroke-width="1"/>
        <circle cx="10" cy="11" r="3" fill="#0d9488"/>
        <line x1="20" y1="9" x2="100" y2="9" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
        <line x1="20" y1="15" x2="80" y2="15" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
        <text x="118" y="14" font-size="7" fill="#6b6b72">2024</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
      </g>
      <g>
        <rect x="0" y="26" width="140" height="22" rx="3" fill="#fff" stroke="#0d9488" stroke-width="1"/>
        <circle cx="10" cy="37" r="3" fill="#0d9488"/>
        <line x1="20" y1="35" x2="105" y2="35" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
        <line x1="20" y1="41" x2="75" y2="41" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
        <text x="118" y="40" font-size="7" fill="#6b6b72">2023</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.6s" fill="freeze"/>
      </g>
      <g>
        <rect x="0" y="52" width="140" height="22" rx="3" fill="#fff" stroke="#0d9488" stroke-width="1"/>
        <circle cx="10" cy="63" r="3" fill="#0d9488"/>
        <line x1="20" y1="61" x2="98" y2="61" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
        <line x1="20" y1="67" x2="85" y2="67" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
        <text x="118" y="66" font-size="7" fill="#6b6b72">2022</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.9s" fill="freeze"/>
      </g>
      <g>
        <rect x="0" y="78" width="140" height="22" rx="3" fill="#fff" stroke="#0d9488" stroke-width="1"/>
        <circle cx="10" cy="89" r="3" fill="#0d9488"/>
        <line x1="20" y1="87" x2="92" y2="87" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
        <line x1="20" y1="93" x2="78" y2="93" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
        <text x="118" y="92" font-size="7" fill="#6b6b72">2021</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.2s" fill="freeze"/>
      </g>
    </g>
    <circle cx="195" cy="22" r="4" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- arrow 2 -->
  <line x1="560" y1="195" x2="588" y2="195" stroke="#0a0a0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="574" y="184" text-anchor="middle" font-size="8" fill="#6b6b72" font-weight="500" letter-spacing="0.5">DRAFT</text>

  <!-- ========== STAGE 3: REASON (CCM core) ========== -->
  <g transform="translate(600, 100)">
    <rect width="240" height="190" rx="14" fill="#0a0a0b" filter="url(#card-shadow)"/>
    <text x="120" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#dbeafe" letter-spacing="2">03 · CCM REASON</text>
    <!-- 3 sub-blocks with rotating cycle -->
    <g transform="translate(20, 46)">
      <g>
        <rect width="200" height="38" rx="6" fill="#1a1a1d" stroke="#2563eb" stroke-width="1.2"/>
        <text x="14" y="24" font-size="11" fill="#fff" font-weight="600">Compose</text>
        <circle cx="184" cy="19" r="3" fill="#2563eb">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(0, 46)">
        <rect width="200" height="38" rx="6" fill="#1a1a1d" stroke="#c9a14a" stroke-width="1.2"/>
        <text x="14" y="24" font-size="11" fill="#fff" font-weight="600">Critique</text>
        <circle cx="184" cy="19" r="3" fill="#c9a14a">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
        </circle>
      </g>
      <g transform="translate(0, 92)">
        <rect width="200" height="38" rx="6" fill="#1a1a1d" stroke="#a855f7" stroke-width="1.2"/>
        <text x="14" y="24" font-size="11" fill="#fff" font-weight="600">Mutate</text>
        <circle cx="184" cy="19" r="3" fill="#a855f7">
          <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
    <circle cx="215" cy="22" r="4" fill="#10b981">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- arrow 3 -->
  <line x1="850" y1="195" x2="878" y2="195" stroke="#0a0a0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="864" y="184" text-anchor="middle" font-size="8" fill="#6b6b72" font-weight="500" letter-spacing="0.5">VERIFIED</text>

  <!-- ========== STAGE 4: VERIFY ========== -->
  <g transform="translate(890, 110)">
    <rect width="220" height="170" rx="14" fill="#fef3c7" filter="url(#card-shadow)"/>
    <text x="110" y="32" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e" letter-spacing="2">04 · VERIFY</text>
    <!-- 4 verified rows -->
    <g transform="translate(28, 50)">
      <g>
        <circle cx="10" cy="11" r="8" fill="#10b981"/>
        <path d="M5,11 L9,15 L15,8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="26" y1="9" x2="120" y2="9" stroke="#92400e" stroke-width="1" opacity="0.5"/>
        <line x1="26" y1="14" x2="100" y2="14" stroke="#92400e" stroke-width="1" opacity="0.3"/>
        <text x="142" y="14" font-size="7" fill="#92400e" font-weight="600">94%</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
      </g>
      <g transform="translate(0, 24)">
        <circle cx="10" cy="11" r="8" fill="#10b981"/>
        <path d="M5,11 L9,15 L15,8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="26" y1="9" x2="115" y2="9" stroke="#92400e" stroke-width="1" opacity="0.5"/>
        <line x1="26" y1="14" x2="92" y2="14" stroke="#92400e" stroke-width="1" opacity="0.3"/>
        <text x="142" y="14" font-size="7" fill="#92400e" font-weight="600">98%</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="1.8s" fill="freeze"/>
      </g>
      <g transform="translate(0, 48)">
        <circle cx="10" cy="11" r="8" fill="#10b981"/>
        <path d="M5,11 L9,15 L15,8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="26" y1="9" x2="118" y2="9" stroke="#92400e" stroke-width="1" opacity="0.5"/>
        <line x1="26" y1="14" x2="105" y2="14" stroke="#92400e" stroke-width="1" opacity="0.3"/>
        <text x="142" y="14" font-size="7" fill="#92400e" font-weight="600">96%</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.1s" fill="freeze"/>
      </g>
      <g transform="translate(0, 72)">
        <circle cx="10" cy="11" r="8" fill="#10b981"/>
        <path d="M5,11 L9,15 L15,8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="26" y1="9" x2="125" y2="9" stroke="#92400e" stroke-width="1" opacity="0.5"/>
        <line x1="26" y1="14" x2="98" y2="14" stroke="#92400e" stroke-width="1" opacity="0.3"/>
        <text x="142" y="14" font-size="7" fill="#92400e" font-weight="600">100%</text>
        <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="2.4s" fill="freeze"/>
      </g>
    </g>
    <text x="110" y="158" text-anchor="middle" font-size="10" fill="#92400e" font-weight="700">all citations resolved ✓</text>
  </g>

  <!-- footer scoreboard -->
  <g transform="translate(0, 320)">
    <line x1="60" y1="0" x2="1140" y2="0" stroke="#e8e8eb" stroke-width="1"/>
    <text x="600" y="22" text-anchor="middle" font-size="11" fill="#6b6b72" font-style="italic">
      66.05% PaperBench · 94.66% SurveyBench · 30+ accepted publications
    </text>
  </g>
</svg>
